[defaults]
roles_path = ./roles
# Trỏ vào thư mục — Ansible tự merge tất cả .yml files bên trong
inventory              = inventory/
#vault_password_file    = .vault_pass
retry_files_enabled    = False
stdout_callback        = default
# [FIX L3] host_key_checking = False là security risk trong production.
# Đổi thành True và quản lý known_hosts properly khi deploy production.
# Giữ False chỉ cho môi trường lab/test có known_hosts chưa setup.
host_key_checking      = False  # TODO: đổi thành True trong production
gathering              = smart
fact_caching           = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout   = 3600
interpreter_python     = auto_silent
# Không hiện deprecation warnings trong production
deprecation_warnings   = False
command_warnings       = False

[ssh_connection]
pipelining             = True
ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=10
# Tăng số lượng parallel connections
forks                  = 20

[privilege_escalation]
become                 = True
become_method          = sudo
become_user            = root
become_ask_pass        = False
