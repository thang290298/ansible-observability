# =============================================================================
# targets/ceph.yml
# Danh sách Ceph clusters cần scrape
# Port mặc định: 9283 (ceph-exporter) hoặc 9128 (ceph_mgr prometheus module)
# =============================================================================

groups:

  - name: ceph-dbp3
    labels:
      role: ceph
      site: DBP
      env: production
      cluster: ceph-dbp3
    hosts:
      - { host: 10.x.x.10, port: 9283 }
      - { host: 10.x.x.11, port: 9283 }
      - { host: 10.x.x.12, port: 9283 }

