name: Ansible CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.docker
          ansible-galaxy collection install community.general

      - name: Run yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, truthy: {allowed-values: ['true', 'false']}}}" \
            inventory/group_vars/all.yml \
            playbooks/ \
            roles/

      - name: Run ansible-lint
        run: |
          ansible-lint --exclude=.git \
            --warn-list=command-instead-of-module \
            playbooks/site.yml
        env:
          ANSIBLE_ROLES_PATH: ./roles

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Install collections
        run: |
          ansible-galaxy collection install community.docker
          ansible-galaxy collection install community.general

      - name: Create dummy vault file for syntax check
        run: |
          printf '%s\n' \
            "vault_telegram_bot_token: dummy" \
            "vault_telegram_chat_id: dummy" \
            "vault_telegram_critical_chat_id: dummy" \
            "vault_grafana_admin_password: dummy" \
            "vault_grafana_db_password: dummy" \
            "vault_postgres_password: dummy" \
            "vault_vrrp_auth_pass: dummy" \
            "vault_haproxy_stats_password: dummy" \
            "vault_gitea_db_password: dummy" \
            "vault_ansible_webhook_secret: dummy" \
            "vault_minio_root_user: dummy" \
            "vault_minio_root_password: dummy" \
            > inventory/group_vars/vault.yml

      - name: Syntax check all playbooks
        run: |
          for playbook in playbooks/*.yml; do
            echo "Checking: $playbook"
            ansible-playbook -i inventory/hosts.yml "$playbook" --syntax-check
          done
        env:
          ANSIBLE_ROLES_PATH: ./roles

  vault-check:
    name: Vault Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check vault.yml is encrypted
        run: |
          if [ -f inventory/group_vars/vault.yml ]; then
            if head -1 inventory/group_vars/vault.yml | grep -q '^\$ANSIBLE_VAULT'; then
              echo "✅ vault.yml is properly encrypted"
            else
              echo "❌ SECURITY: vault.yml is NOT encrypted! Never commit plaintext secrets."
              exit 1
            fi
          else
            echo "ℹ️ vault.yml does not exist (OK for CI)"
          fi

      - name: Check for hardcoded passwords in README
        run: |
          if grep -rE "(VNPTCloud@|HAProxy@|admin@)[0-9]" README.md 2>/dev/null; then
            echo "❌ SECURITY: Hardcoded passwords found in README.md"
            exit 1
          fi
          echo "✅ No hardcoded passwords found"

      - name: Check for root user in inventory
        run: |
          if grep -r "ansible_user:\s*root" inventory/ 2>/dev/null; then
            echo "❌ SECURITY: ansible_user=root found in inventory!"
            exit 1
          fi
          echo "✅ No root user in inventory"
