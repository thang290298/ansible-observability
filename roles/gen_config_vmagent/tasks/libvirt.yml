---
# roles/gen_config_vmagent/tasks/libvirt.yml
# =============================================================================
# Gen scrape_libvirt_<site>.yml cho từng group trong libvirt_groups
# Libvirt exporter (qua telegraf hoặc native libvirt-exporter)
# Port: libvirt_exporter_port (default: 9177)
# =============================================================================

- name: "[gen_config/libvirt] Gen scrape config cho từng libvirt group"
  vars:
    _first_host: "{{ groups[target_group][0] }}"
    _site: "{{ hostvars[_first_host].meta.site | default(hostvars[_first_host].site | default(target_group)) }}"
    _output_file: "{{ gen_config_output_dir }}/scrape_libvirt_{{ _site }}.yml"
  ansible.builtin.template:
    src: scrape_libvirt.yml.j2
    dest: "{{ _output_file }}"
    owner: "{{ gen_config_file_owner }}"
    group: "{{ gen_config_file_group }}"
    mode: "{{ gen_config_file_mode }}"
    backup: true
  loop: "{{ libvirt_groups }}"
  loop_control:
    loop_var: target_group
    label: "{{ target_group }} → scrape_libvirt_{{ hostvars[groups[target_group][0]].meta.site | default(target_group) }}.yml"
  when:
    - groups[target_group] is defined
    - groups[target_group] | length > 0
  register: libvirt_config_result
  tags: [gen_config, libvirt]

- name: "[gen_config/libvirt] ✅ Libvirt scrape configs generated"
  ansible.builtin.debug:
    msg: "Generated {{ libvirt_config_result.results | selectattr('changed') | list | length }} / {{ libvirt_groups | length }} libvirt scrape files"
  tags: [gen_config, libvirt]
