---
# roles/docker/tasks/main.yml
# Install Docker Engine via apt on Ubuntu

- name: "[docker] Install prerequisites"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: "[docker] Create keyrings directory"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: "[docker] Download Docker GPG key"
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: "[docker] Add Docker repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
    update_cache: true

- name: "[docker] Install Docker Engine"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: false

- name: "[docker] Install Python Docker SDK"
  ansible.builtin.pip:
    name: docker
    state: present
    extra_args: "--break-system-packages"

- name: "[docker] Enable + Start Docker"
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: "[docker] Verify Docker running"
  ansible.builtin.command: docker info
  changed_when: false
