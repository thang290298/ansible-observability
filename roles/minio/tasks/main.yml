---
# roles/minio/tasks/main.yml
# MinIO — S3-compatible object storage cho Loki backend
# Chạy trên: monitoring_loki nodes (mỗi node 1 instance, distributed mode)

- name: "[minio] Hiển thị cấu hình"
  debug:
    msg: |
      ══════════════════════════════════════════
      Deploying MinIO {{ minio_version }}
      Node        : {{ inventory_hostname }} ({{ ansible_host }})
      API port    : {{ minio_api_port }}
      Console port: {{ minio_console_port }}
      Data path   : {{ minio_data_path }}
      ══════════════════════════════════════════

# ── INSTALL ─────────────────────────────────────────────────────────────────

- name: "[minio] Tạo thư mục"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  loop:
    - "{{ monitoring_base_dir }}/minio"
    - "{{ minio_data_path }}"
  become: true
  tags: [minio]

# ── CONFIGURE ────────────────────────────────────────────────────────────────

- name: "[minio] Generate docker-compose"
  template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/minio/docker-compose.yml"
    mode: '0644'
    backup: true
  notify: Restart minio
  tags: [minio]

# ── START SERVICE ─────────────────────────────────────────────────────────────

- name: "[minio] Start MinIO"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/minio"
    state: present
  tags: [minio]

# ── VERIFY ────────────────────────────────────────────────────────────────────

- name: "[minio] Chờ MinIO ready"
  uri:
    url: "http://localhost:{{ minio_api_port }}/minio/health/live"
    status_code: 200
  retries: 15
  delay: 5
  register: minio_health
  tags: [minio, verify]

- name: "[minio] Tạo bucket cho Loki"
  command: >
    docker run --rm --network host
    minio/mc:latest sh -c
    "mc alias set local http://{{ ansible_host }}:{{ minio_api_port }} {{ minio_root_user }} {{ minio_root_password }} &&
    mc mb --ignore-existing local/{{ loki_minio_bucket }}"
  register: bucket_result
  changed_when: "'Bucket created' in bucket_result.stdout"
  tags: [minio]

- name: "[minio] ✅ MinIO OK trên {{ inventory_hostname }}"
  debug:
    msg: "MinIO running at http://{{ ansible_host }}:{{ minio_api_port }}"
  tags: [minio, verify]

