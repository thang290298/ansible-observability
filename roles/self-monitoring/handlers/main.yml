---
# roles/self-monitoring/handlers/main.yml
# Handlers for self-monitoring

- name: Reload Prometheus config
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port | default(9090) }}/-/reload"
    method: POST
    status_code: [200, 204]
  ignore_errors: true
  listen: "Reload Prometheus config"
