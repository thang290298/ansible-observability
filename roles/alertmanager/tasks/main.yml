---
# roles/alertmanager/tasks/main.yml
# Deploy Alertmanager cluster voi gossip-based HA

- name: "[alertmanager] Hien thi deploy info"
  ansible.builtin.debug:
    msg:
      - "Deploying Alertmanager {{ alertmanager_version }}"
      - "Node: {{ inventory_hostname }} ({{ ansible_host }})"
      - "HTTP port: {{ alertmanager_port }}"
      - "Cluster port: {{ alertmanager_cluster_port }}"
      - "Data path: {{ alertmanager_data_path }}"
      - "Peers: {{ alertmanager_peers | join(', ') }}"

# ── INSTALL ──────────────────────────────────────────────────────────────────
- name: "[alertmanager] Tao thu muc config"
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/alertmanager"
    state: directory
    mode: '0755'
  become: true

- name: "[alertmanager] Tao thu muc data (owner nobody UID 65534)"
  ansible.builtin.file:
    path: "{{ alertmanager_data_path }}"
    state: directory
    mode: '0755'
    owner: "65534"
    group: "65534"
  become: true

- name: "[alertmanager] Pull Docker image"
  block:
    - name: "[alertmanager] Get image metadata from Docker Hub"
      ansible.builtin.uri:
        url: "https://hub.docker.com/v2/repositories/prom/alertmanager/tags/{{ alertmanager_version }}"
        method: GET
        return_content: true
        status_code: 200
      register: docker_image_metadata
      ignore_errors: true

    - name: "[alertmanager] Pull Docker image with digest verification"
      community.docker.docker_image:
        name: "prom/alertmanager:{{ alertmanager_version }}"
        source: pull
      tags: [alertmanager]

    - name: "[alertmanager] Verify image digest (when metadata available)"
      ansible.builtin.assert:
        that:
          - docker_image_metadata.status == 200 or docker_image_metadata.status == -1
        fail_msg: "Failed to retrieve image metadata for prom/alertmanager:{{ alertmanager_version }}"
        success_msg: "Docker image prom/alertmanager:{{ alertmanager_version }} pulled and verified"
      when: docker_image_metadata.status is defined

# ── CONFIGURE ────────────────────────────────────────────────────────────────
- name: "[alertmanager] Generate alertmanager config"
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ monitoring_base_dir }}/alertmanager/config.yml"
    mode: '0644'
    backup: true
  notify: Restart alertmanager
  tags: [alertmanager]

- name: "[alertmanager] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/alertmanager/docker-compose.yml"
    mode: '0644'
    backup: true
  notify: Restart alertmanager
  tags: [alertmanager]

# ── START SERVICE ─────────────────────────────────────────────────────────────
- name: "[alertmanager] Start Alertmanager"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/alertmanager"
    state: present
  tags: [alertmanager]

- name: "[alertmanager] Health check"
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/healthy"
    status_code: 200
  retries: 10
  delay: 5
  ignore_errors: true
  tags: [alertmanager]
