---
# roles/alertmanager/tasks/main.yml
# Deploy Alertmanager cluster voi gossip-based HA

- name: "[alertmanager] Hien thi deploy info"
  ansible.builtin.debug:
    msg:
      - "Deploying Alertmanager {{ alertmanager_version }}"
      - "Node: {{ inventory_hostname }} ({{ ansible_host }})"
      - "HTTP port: {{ alertmanager_port }}"
      - "Cluster port: {{ alertmanager_cluster_port }}"
      - "Data path: {{ alertmanager_data_path }}"
      - "Peers: {{ alertmanager_peers | join(', ') }}"

# ── INSTALL ──────────────────────────────────────────────────────────────────
- name: "[alertmanager] Tao thu muc config"
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/alertmanager"
    state: directory
    mode: '0755'
  become: true

- name: "[alertmanager] Tao thu muc data (owner nobody UID 65534)"
  ansible.builtin.file:
    path: "{{ alertmanager_data_path }}"
    state: directory
    mode: '0755'
    owner: "65534"
    group: "65534"
  become: true

- name: "[alertmanager] Pull Docker image"
  community.docker.docker_image:
    name: "prom/alertmanager:{{ alertmanager_version }}"
    source: pull
  tags: [alertmanager]

# ── CONFIGURE ────────────────────────────────────────────────────────────────
- name: "[alertmanager] Generate alertmanager config"
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ monitoring_base_dir }}/alertmanager/config.yml"
    mode: '0644'
    backup: true
  notify: Restart alertmanager
  tags: [alertmanager]

- name: "[alertmanager] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/alertmanager/docker-compose.yml"
    mode: '0644'
    backup: true
  notify: Restart alertmanager
  tags: [alertmanager]

# ── START SERVICE ─────────────────────────────────────────────────────────────
- name: "[alertmanager] Start Alertmanager"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/alertmanager"
    state: present
  tags: [alertmanager]

- name: "[alertmanager] Health check"
  ansible.builtin.uri:
    url: "http://localhost:{{ alertmanager_port }}/-/healthy"
    status_code: 200
  retries: 10
  delay: 5
  ignore_errors: true
  tags: [alertmanager]
