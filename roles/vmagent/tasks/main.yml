---
# roles/vmagent/tasks/main.yml
- name: "[vmagent] Tao thu muc"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - "{{ monitoring_base_dir }}/vmagent"
    - "{{ vmagent_data_path }}"
    - /etc/vmagent/targets

- name: "[vmagent] Generate scrape config tu inventory"
  ansible.builtin.template:
    src: vmagent-scrape.yml.j2
    dest: /etc/vmagent/scrape.yml
    backup: true
  become: true
  notify: Reload vmagent

- name: "[vmagent] Copy file-based targets"
  ansible.builtin.copy:
    src: "{{ inventory_dir }}/../targets/"
    dest: /etc/vmagent/targets/
    mode: '0644'
  become: true
  notify: Reload vmagent
  failed_when: false   # Fix: targets/ dir có thể chưa có — không block deploy

- name: "[vmagent] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/vmagent/docker-compose.yml"
    backup: true
  notify: Restart vmagent

- name: "[vmagent] Start vmagent"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/vmagent"
    state: present

- name: "[vmagent] Health check"
  ansible.builtin.uri:
    url: "http://localhost:{{ vmagent_port }}/health"
    status_code: 200
  ignore_errors: true
  retries: 10
  delay: 5
