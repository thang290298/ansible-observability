---
# roles/random_ping/tasks/main.yml
- name: "Create blackbox-random-ping directory"
  ansible.builtin.file:
    path: "{{ random_ping_dir | default('/opt/monitoring/blackbox-random-ping') }}/config"
    state: directory
    mode: '0755'

- name: "Deploy blackbox config"
  ansible.builtin.template:
    src: config/blackbox.yml.j2
    dest: "{{ random_ping_dir | default('/opt/monitoring/blackbox-random-ping') }}/config/blackbox.yml"
    mode: '0644'
  notify: restart blackbox-random-ping

- name: "Deploy docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ random_ping_dir | default('/opt/monitoring/blackbox-random-ping') }}/docker-compose.yml"
    mode: '0644'
  notify: restart blackbox-random-ping

- name: "Start blackbox-random-ping"
  community.docker.docker_compose_v2:
    project_src: "{{ random_ping_dir | default('/opt/monitoring/blackbox-random-ping') }}"
    state: present
