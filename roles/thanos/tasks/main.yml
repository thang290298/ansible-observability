---
# roles/thanos/tasks/main.yml
# Deploy Thanos — long-term storage on S3
# ✓ FIX #5: Make deployment conditional but recommended
# ✓ FIX #5: Add sidecar to Prometheus components for automatic integration

- name: "[thanos] Check S3 configuration"
  ansible.builtin.assert:
    that:
      - s3_enabled | default(false) | bool
      - s3_bucket_name is defined
    fail_msg: |
      ⚠️  Thanos deployment skipped (S3 not enabled)
      
      To enable long-term storage on S3:
        1. Set s3_enabled: true
        2. Configure s3_bucket_name, s3_region
        3. Set AWS credentials in vault.yml
      
      Thanos is RECOMMENDED for:
        - Long-term metrics retention (365+ days)
        - Cross-cluster metric federation
        - Compliance & audit trail
    success_msg: |
      ✓ Thanos deployment enabled
        Bucket: {{ s3_bucket_name }}
        Region: {{ s3_region | default('us-east-1') }}
  run_once: true
  tags: [thanos]

# ── Skip if S3 not enabled ──────────────────────────────────────────────────
- name: "[thanos] Skip deployment if s3_enabled=false"
  ansible.builtin.meta: end_host
  when: not (s3_enabled | default(false))

- name: "[thanos] Tạo thư mục data"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  become: true
  loop:
    - "{{ monitoring_base_dir }}/thanos-receive"
    - "{{ monitoring_base_dir }}/thanos-store"
    - "{{ monitoring_base_dir }}/thanos-query"
    - "{{ thanos_receive_data_path }}"
    - "{{ thanos_store_data_path }}"
  tags: [thanos]

- name: "[thanos] Deploy thanos-receive"
  ansible.builtin.include_tasks: receive.yml
  when: inventory_hostname in groups['monitoring_thanos_receive']
  tags: [thanos]

- name: "[thanos] Deploy thanos-store"
  ansible.builtin.include_tasks: store.yml
  when: inventory_hostname in groups['monitoring_thanos_receive']
  tags: [thanos]

- name: "[thanos] Deploy thanos-query"
  ansible.builtin.include_tasks: query.yml
  when: inventory_hostname in groups['monitoring_thanos_query']
  tags: [thanos]
