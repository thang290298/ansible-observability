---
# roles/tls-encryption/handlers/main.yml
# Handlers for TLS configuration changes

- name: Reload Prometheus config
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port | default(9090) }}/-/reload"
    method: POST
    status_code: [200, 204]
  ignore_errors: true
  listen: "Reload Prometheus config"

- name: Restart loki
  community.docker.docker_container:
    name: loki
    state: restarted
  ignore_errors: true
  listen: "Restart loki"

- name: Restart vmagent
  community.docker.docker_container:
    name: vmagent
    state: restarted
  ignore_errors: true
  listen: "Restart vmagent"

- name: Restart haproxy
  community.docker.docker_container:
    name: haproxy
    state: restarted
  ignore_errors: true
  listen: "Restart haproxy"

- name: Restart alertmanager
  community.docker.docker_container:
    name: alertmanager
    state: restarted
  ignore_errors: true
  listen: "Restart alertmanager"
