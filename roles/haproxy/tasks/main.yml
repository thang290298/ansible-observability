---
# roles/haproxy/tasks/main.yml
# Deploy HAProxy Load Balancer

- name: "[haproxy] Install HAProxy {{ haproxy_version }}"
  ansible.builtin.package:
    name: "haproxy={{ haproxy_version }}*"
    state: present
  become: true
  tags: [haproxy]

- name: "[haproxy] Tao runtime directory"
  ansible.builtin.file:
    path: /run/haproxy
    state: directory
    mode: '0755'
    owner: haproxy
    group: haproxy
  become: true
  tags: [haproxy]

- name: "[haproxy] Generate HAProxy config"
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
    validate: "haproxy -c -f %s"
    backup: true
  become: true
  notify: Reload haproxy
  tags: [haproxy]

- name: "[haproxy] Enable va start HAProxy service"
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true
    daemon_reload: true
  become: true
  tags: [haproxy]

- name: "[haproxy] Verify HAProxy running"
  ansible.builtin.uri:
    url: "http://localhost:{{ haproxy_stats_port }}/stats"
    status_code: 200
  retries: 5
  delay: 3
  ignore_errors: true
  tags: [haproxy]
