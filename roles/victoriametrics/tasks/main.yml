---
# roles/victoriametrics/tasks/main.yml

- name: "[vm] Tạo docker-compose cho VictoriaMetrics"
  template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/victoriametrics/docker-compose.yml"
    backup: true
  notify: Restart victoriametrics
  tags: [victoriametrics]

- name: "[vm] Tạo thư mục data"
  file:
    path: "{{ vm_storage_data_path }}"
    state: directory
    mode: '0755'
  tags: [victoriametrics]

# [FIX M1] Chỉ pull images thực sự dùng trong role này (storage/insert/select)
# vmagent và vmalert được pull trong roles riêng của chúng
- name: "[vm] Pull Docker images"
  community.docker.docker_image:
    name: "victoriametrics/{{ item }}:{{ victoriametrics_version }}"
    source: pull
  loop:
    - vmstorage
    - vminsert
    - vmselect
  tags: [victoriametrics]

- name: "[vm] Start VictoriaMetrics stack"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/victoriametrics"
    state: present
    pull: policy
  tags: [victoriametrics]

- name: "[vm] Chờ vmstorage sẵn sàng"
  uri:
    url: "http://localhost:{{ vmstorage_port }}/metrics"
    status_code: 200
  retries: 10
  delay: 5
  tags: [victoriametrics, verify]
