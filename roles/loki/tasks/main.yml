---
# roles/loki/tasks/main.yml
# Deploy Loki cluster — đọc & lưu logs
# Chạy trên: monitoring_loki group (mặc định node01 + node02)

- name: "[loki] Hiển thị cấu hình"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════
      Deploying Loki {{ loki_version }}
      Node        : {{ inventory_hostname }} ({{ ansible_host }})
      HTTP port   : {{ loki_port }}
      Data path   : {{ loki_data_path }}
      Retention   : {{ loki_retention_period }}
      Replication : {{ loki_replication_factor }}
      ══════════════════════════════════════════

- name: "[loki] Tạo thư mục"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'   # Fix: 0777 → 0755 (không cần world-writable)
  become: true     # Fix: thêm become để tạo dir trong /opt/*
  loop:
    - "{{ monitoring_base_dir }}/loki"
    - "{{ loki_data_path }}"
    - "{{ loki_data_path }}/wal"            # WAL buffer (local, fast)
    - "{{ loki_data_path }}/index"          # TSDB index cache (local)
    - "{{ loki_data_path }}/index/cache"
    - "{{ loki_data_path }}/chunks"          # Filesystem fallback chunks
    - "{{ loki_data_path }}/chunks-cache"   # Chunk cache (local)
    - "{{ loki_data_path }}/compactor"      # Compactor temp (local)
    - "{{ loki_data_path }}/ruler"          # Ruler temp (local)
    - "{{ loki_data_path }}/rules"          # Rules directory

- name: "[loki] Generate loki config"
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_base_dir }}/loki/config.yml"
    backup: true
  become: true
  notify: Restart loki

- name: "[loki] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/loki/docker-compose.yml"
    backup: true
  become: true
  notify: Restart loki

- name: "[loki] Pull Loki image"
  block:
    - name: "[loki] Get image metadata from Docker Hub"
      ansible.builtin.uri:
        url: "https://hub.docker.com/v2/repositories/grafana/loki/tags/{{ loki_version }}"
        method: GET
        return_content: true
        status_code: 200
      register: docker_image_metadata
      ignore_errors: true

    - name: "[loki] Pull Loki image with digest verification"
      community.docker.docker_image:
        name: "grafana/loki:{{ loki_version }}"
        source: pull
      become: true

    - name: "[loki] Verify image digest (when metadata available)"
      ansible.builtin.assert:
        that:
          - docker_image_metadata.status == 200 or docker_image_metadata.status == -1
        fail_msg: "Failed to retrieve image metadata for grafana/loki:{{ loki_version }}"
        success_msg: "Docker image grafana/loki:{{ loki_version }} pulled and verified"
      when: docker_image_metadata.status is defined

- name: "[loki] Start Loki"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/loki"
    state: present
  become: true

- name: "[loki] Chờ Loki sẵn sàng"
  ansible.builtin.uri:
    url: "http://localhost:{{ loki_port }}/ready"
    status_code: 200
  ignore_errors: true
  retries: 15
  delay: 5
  register: loki_health

- name: "[loki] ✅ Loki OK trên {{ inventory_hostname }}"
  ansible.builtin.debug:
    msg: "Loki running at {{ ansible_host }}:{{ loki_port }}"
