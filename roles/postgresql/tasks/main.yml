---
# roles/postgresql/tasks/main.yml
# Deploy PostgreSQL with Patroni HA — Backend database cho Grafana và Gitea
# Chạy trên: monitoring_db group (min 3 nodes for failover)

# ── PRE-FLIGHT CHECKS ────────────────────────────────────────────────────────
- name: "[postgresql] Run pre-flight checks"
  ansible.builtin.include_tasks: preflight.yml
  tags: [postgresql, preflight]

- name: "[postgresql] Hiển thị cấu hình"
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════
      Deploying PostgreSQL {{ postgres_version }}
      Node        : {{ inventory_hostname }} ({{ ansible_host }})
      Port        : {{ postgres_port }}
      Data path   : {{ postgres_data_path }}
      ══════════════════════════════════════════

# ── INSTALL ─────────────────────────────────────────────────────────────────

- name: "[postgresql] Tạo thư mục config"
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/postgresql"
    state: directory
    mode: '0755'
  become: true
  tags: [postgresql]

- name: "[postgresql] Tạo thư mục data (owner postgres UID 999)"
  ansible.builtin.file:
    path: "{{ postgres_data_path }}"
    state: directory
    mode: '0700'
    owner: "999"
    group: "999"
  become: true
  tags: [postgresql]

- name: "[postgresql] Pull PostgreSQL Docker image"
  block:
    - name: "[postgresql] Get image metadata from Docker Hub"
      ansible.builtin.uri:
        url: "https://hub.docker.com/v2/repositories/library/postgres/tags/{{ postgres_version }}"
        method: GET
        return_content: true
        status_code: 200
      register: docker_image_metadata
      ignore_errors: true

    - name: "[postgresql] Pull PostgreSQL Docker image with digest verification"
      community.docker.docker_image:
        name: "postgres:{{ postgres_version }}"
        source: pull
      tags: [postgresql]

    - name: "[postgresql] Verify image digest (when metadata available)"
      ansible.builtin.assert:
        that:
          - docker_image_metadata.status == 200 or docker_image_metadata.status == -1
        fail_msg: "Failed to retrieve image metadata for postgres:{{ postgres_version }}"
        success_msg: "Docker image postgres:{{ postgres_version }} pulled and verified"
      when: docker_image_metadata.status is defined

# ── CONFIGURE ────────────────────────────────────────────────────────────────

- name: "[postgresql] Setup Patroni HA (if 3+ nodes)"
  ansible.builtin.include_tasks: patroni.yml
  when:
    - groups['monitoring_db'] | length >= 3
    - enable_postgresql_ha | default(true)
  tags: [postgresql, patroni]

- name: "[postgresql] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/postgresql/docker-compose.yml"
    mode: '0644'
    backup: true
  notify: Restart postgresql
  tags: [postgresql]

- name: "[postgresql] Generate init SQL script"
  ansible.builtin.template:
    src: init.sql.j2
    dest: "{{ monitoring_base_dir }}/postgresql/init.sql"
    mode: '0644'
  tags: [postgresql]

# ── START SERVICE ─────────────────────────────────────────────────────────────

- name: "[postgresql] Start PostgreSQL"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/postgresql"
    state: present
  tags: [postgresql]

# ── VERIFY ────────────────────────────────────────────────────────────────────

- name: "[postgresql] Chờ PostgreSQL sẵn sàng"
  ansible.builtin.command: >
    docker exec postgresql pg_isready -U postgres
  register: pg_ready
  retries: 15
  delay: 5
  until: pg_ready.rc == 0
  changed_when: false
  tags: [postgresql, verify]

- name: "[postgresql] Tạo database và user cho Grafana"
  ansible.builtin.command: >
    docker exec postgresql psql -U postgres -c
    "SELECT 1 FROM pg_database WHERE datname='{{ grafana_db_name }}'"
  register: grafana_db_check
  changed_when: false
  failed_when: false
  tags: [postgresql]

- name: "[postgresql] Init Grafana database nếu chưa tồn tại"
  ansible.builtin.command: >
    docker exec postgresql psql -U postgres -f /docker-entrypoint-initdb.d/init.sql
  # [FIX M4] Dùng regex match thay vì string 'in' để tránh false negative
  when: grafana_db_check.stdout_lines | select('match', '.*1 row.*') | list | length == 0
  tags: [postgresql]

- name: "[postgresql] ✅ PostgreSQL OK trên {{ inventory_hostname }}"
  ansible.builtin.debug:
    msg: "PostgreSQL running at {{ ansible_host }}:{{ postgres_port }}"
  tags: [postgresql, verify]
