---
# roles/vmstorage/tasks/main.yml
- name: "[vmstorage] Tao thu muc"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ monitoring_base_dir }}/vmstorage"
    - "{{ vm_storage_data_path }}"

- name: "[vmstorage] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/vmstorage/docker-compose.yml"
    backup: true
  notify: Restart vmstorage

- name: "[vmstorage] Start vmstorage"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/vmstorage"
    state: present

- name: "[vmstorage] Health check"
  block:
    - name: "[vmstorage] Check if healthy"
      ansible.builtin.uri:
        url: "http://localhost:{{ vmstorage_port }}/health"
        status_code: 200
      retries: 10
      delay: 5
      register: vmstorage_health_result

    - name: "[vmstorage] Assert health check passed"
      ansible.builtin.assert:
        that:
          - vmstorage_health_result.status == 200
        fail_msg: "vmstorage health check failed after 10 retries. Status: {{ vmstorage_health_result.get('status', 'N/A') }}"
        success_msg: "vmstorage is healthy and ready"
