---
# roles/vminsert/tasks/main.yml
- name: "[vminsert] Tao thu muc"
  ansible.builtin.file:
    path: "{{ monitoring_base_dir }}/vminsert"
    state: directory
    mode: '0755'

- name: "[vminsert] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/vminsert/docker-compose.yml"
    backup: true
  notify: Restart vminsert

- name: "[vminsert] Start vminsert"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/vminsert"
    state: present

- name: "[vminsert] Health check"
  ansible.builtin.uri:
    url: "http://localhost:{{ vminsert_port }}/health"
    status_code: 200
  ignore_errors: true
  retries: 10
  delay: 3
  tags: [vminsert]
