---
# roles/grafana/tasks/main.yml
# Deploy Grafana voi PostgreSQL backend (HA-ready)

- name: "[grafana] Hien thi deploy info"
  ansible.builtin.debug:
    msg:
      - "Deploying Grafana {{ grafana_version }}"
      - "Node: {{ inventory_hostname }} ({{ ansible_host }})"
      - "HTTP port: {{ grafana_port }}"
      - "DB: {{ grafana_db_host }}:{{ grafana_db_port }}/{{ grafana_db_name }}"

# ── INSTALL ──────────────────────────────────────────────────────────────────
- name: "[grafana] Tao thu muc config"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ monitoring_base_dir }}/grafana"
    - "{{ monitoring_base_dir }}/grafana/provisioning"
    - "{{ monitoring_base_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_base_dir }}/grafana/provisioning/dashboards"
  become: true
  tags: [grafana]

- name: "[grafana] Tao thu muc data (owner grafana UID 472)"
  ansible.builtin.file:
    path: "{{ grafana_data_path }}"
    state: directory
    mode: '0755'
    owner: "472"
    group: "472"
  become: true
  tags: [grafana]

- name: "[grafana] Pull Grafana Docker image"
  block:
    - name: "[grafana] Get image metadata from Docker Hub"
      ansible.builtin.uri:
        url: "https://hub.docker.com/v2/repositories/grafana/grafana/tags/{{ grafana_version }}"
        method: GET
        return_content: true
        status_code: 200
      register: docker_image_metadata
      ignore_errors: true

    - name: "[grafana] Pull Grafana Docker image with digest verification"
      community.docker.docker_image:
        name: "grafana/grafana:{{ grafana_version }}"
        source: pull
      tags: [grafana]

    - name: "[grafana] Verify image digest (when metadata available)"
      ansible.builtin.assert:
        that:
          - docker_image_metadata.status == 200 or docker_image_metadata.status == -1
        fail_msg: "Failed to retrieve image metadata for grafana/grafana:{{ grafana_version }}"
        success_msg: "Docker image grafana/grafana:{{ grafana_version }} pulled and verified"
      when: docker_image_metadata.status is defined

# ── CONFIGURE ────────────────────────────────────────────────────────────────
- name: "[grafana] Generate datasources provisioning"
  ansible.builtin.template:
    src: provisioning/datasources.yml.j2
    dest: "{{ monitoring_base_dir }}/grafana/provisioning/datasources/datasources.yml"
    mode: '0644'
    backup: true
  notify: Restart grafana
  tags: [grafana]

- name: "[grafana] Generate docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_base_dir }}/grafana/docker-compose.yml"
    mode: '0644'
    backup: true
  notify: Restart grafana
  tags: [grafana]

# ── START SERVICE ─────────────────────────────────────────────────────────────
- name: "[grafana] Start Grafana"
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_base_dir }}/grafana"
    state: present
  tags: [grafana]

- name: "[grafana] Health check"
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    status_code: 200
  retries: 15
  delay: 5
  ignore_errors: true
  tags: [grafana]
