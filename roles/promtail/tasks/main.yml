---
# roles/promtail/tasks/main.yml

- name: "[promtail] Tao thu muc"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/promtail
    - /var/lib/promtail

- name: "[promtail] Check if promtail binary exists"
  ansible.builtin.stat:
    path: /usr/local/bin/promtail
  register: promtail_binary

- name: "[promtail] Install unzip"
  ansible.builtin.apt:
    name: unzip
    state: present
  when: not promtail_binary.stat.exists

- name: "[promtail] Download Promtail binary"
  ansible.builtin.shell: |
    curl -L -o /tmp/promtail-linux-amd64.zip \
      "https://github.com/grafana/loki/releases/download/v{{ loki_version }}/promtail-linux-amd64.zip"
  args:
    creates: /usr/local/bin/promtail
  when: not promtail_binary.stat.exists

- name: "[promtail] Extract and install binary"
  ansible.builtin.shell: |
    cd /tmp && unzip -o promtail-linux-amd64.zip && \
    chmod +x promtail-linux-amd64 && \
    mv promtail-linux-amd64 /usr/local/bin/promtail
  args:
    creates: /usr/local/bin/promtail
  when: not promtail_binary.stat.exists
  notify: Restart promtail

- name: "[promtail] Generate config"
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    backup: true
  notify: Restart promtail

- name: "[promtail] Tao systemd service"
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart promtail

- name: "[promtail] Enable va start Promtail"
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
    daemon_reload: true

- name: "[promtail] Verify Promtail running"
  ansible.builtin.uri:
    url: "http://localhost:{{ promtail_port }}/ready"
    status_code: 200
  ignore_errors: true
  retries: 5
  delay: 3

- name: "[promtail] Promtail OK tren {{ inventory_hostname }}"
  ansible.builtin.debug:
    msg: "Promtail sending logs to Loki: {{ loki_push_urls }}"
