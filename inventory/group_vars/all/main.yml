---
# inventory/group_vars/all/main.yml
# =============================================================================
# Tất cả config tĩnh toàn cục — chỉnh sửa tại đây khi thêm node hay đổi config
# Secrets KHÔNG được để plain text — dùng vault_* từ vault.yml
# =============================================================================

# =============================================================================
# ANSIBLE CONNECTION
# Lưu ý: ansible_user: root + ansible_become: true là OK nhưng become sẽ
# không có tác dụng leo quyền (đã là root). Giữ để tương thích các task
# dùng become_user (vd: postgres).
# Khuyến nghị production: dùng user riêng có sudo thay vì root trực tiếp.
# =============================================================================
# ⚠️  PRODUCTION WARNING: Không dùng root trực tiếp trong môi trường production
# Khuyến nghị: Tạo user riêng (vd: ansible) có sudo NOPASSWD, sau đó đổi về user đó
# Ví dụ production:
#   ansible_user: ansible
#   ansible_become: true
#   ansible_become_method: sudo
#   ansible_ssh_private_key_file: ~/.ssh/ansible_key
ansible_user: root
ansible_become: true
ansible_become_method: sudo
# ansible_ssh_private_key_file: ~/.ssh/id_rsa   # uncomment nếu dùng key riêng

# =============================================================================
# NETWORK — Thay đổi trước khi deploy
# =============================================================================
vip_address: "10.171.131.30"
# ⚠️ vip_interface: Nếu các node có interface name khác nhau, override trong host_vars
# Ví dụ: host_vars/node01.yml → vip_interface: "eth0"
# Tự detect: "{{ ansible_default_ipv4.interface }}" (dùng nếu tất cả node cùng interface)
vip_interface: "ens3"
vip_prefix_len: 24             # Prefix length cho VIP — thay đổi nếu subnet khác /24
vrrp_router_id: 51
vrrp_auth_pass: "{{ vault_vrrp_auth_pass }}"

keepalived_base_priority: 110
keepalived_priority_step: 10

# =============================================================================
# VERSIONS — Chỉ thay đổi ở đây để upgrade toàn bộ
# =============================================================================
victoriametrics_version: "v1.115.0-cluster"   # Updated: v1.102 → v1.115
vmagent_version:          "v1.115.0"            # Updated: v1.102 → v1.115
node_exporter_version:    "1.8.2"
grafana_version:          "12.0.0"              # Updated: 11.4 → 12.0
alertmanager_version:     "v0.28.0"
haproxy_version:          "2.8"
postgres_version:         "15"
loki_version:             "3.3.2"
minio_version:            "RELEASE.2024-11-07T00-52-20Z"
gitea_version:            "1.22.3"
blackbox_exporter_version: "v0.25.0"
thanos_version:           "v0.37.2"

# =============================================================================
# VICTORIAMETRICS CLUSTER
# =============================================================================
vm_replication_factor: 2
vm_storage_data_path: "/data/vmstorage"

# Public ports (exposed qua HAProxy / VIP)
vminsert_port: 8480
vmselect_port: 8481
vmstorage_port: 8482
vmagent_port:  8429
vmalert_port:  8880

# Internal ports (giao tiếp nội bộ container-to-container)
# Offset để tránh conflict với HAProxy frontend ports
vminsert_internal_port:    18480
vmselect_internal_port:    18481
vmstorage_internal_port:   18482
vmstorage_vminsert_port:   8400   # Port vmstorage lắng nghe cho vminsert
vmstorage_vmselect_port:   8401   # Port vmstorage lắng nghe cho vmselect
alertmanager_internal_port: 19093
loki_internal_port:        13100
vmagent_internal_port:     18429
vmalert_internal_port:     18880

# Resource limits (override per host nếu cần)
vmstorage_mem_limit: "4g"
vmstorage_cpu_limit: "2.0"
vminsert_mem_limit:  "1g"
vminsert_cpu_limit:  "1.0"
vmselect_mem_limit:  "2g"
vmselect_cpu_limit:  "1.5"

# storageNode tự generate từ inventory — KHÔNG hardcode IP
vmstorage_nodes: >-
  {{ groups['monitoring_storage']
     | map('extract', hostvars, 'ansible_host')
     | map('regex_replace', '$', ':' + vmstorage_vminsert_port | string)
     | list }}

vmstorage_select_nodes: >-
  {{ groups['monitoring_storage']
     | map('extract', hostvars, 'ansible_host')
     | map('regex_replace', '$', ':' + vmstorage_vmselect_port | string)
     | list }}

# vm_retention: 6 tháng khi có S3/Thanos, 12 tháng khi không
vm_retention_period: "{{ '6' if s3_enabled | default(false) else '12' }}"

# =============================================================================
# HAPROXY
# =============================================================================
haproxy_stats_port:     8404
haproxy_stats_user:     admin
haproxy_stats_password: "{{ vault_haproxy_stats_password }}"

# =============================================================================
# ALERTMANAGER CLUSTER
# =============================================================================
alertmanager_port:         9093
alertmanager_cluster_port: 9094
alertmanager_data_path:    "/data/alertmanager"

alertmanager_peers: >-
  {{ groups['monitoring_alertmanager']
     | map('extract', hostvars, 'ansible_host')
     | map('regex_replace', '$', ':' + alertmanager_cluster_port | string)
     | list }}

telegram_bot_token:          "{{ vault_telegram_bot_token }}"
telegram_chat_id:            "{{ vault_telegram_chat_id }}"
telegram_critical_chat_id:   "{{ vault_telegram_critical_chat_id }}"

# =============================================================================
# GRAFANA
# =============================================================================
grafana_port:           13000
grafana_admin_user:     admin
grafana_admin_password: "{{ vault_grafana_admin_password }}"
grafana_db_host:        "{{ hostvars[groups['monitoring_db'][0]]['ansible_host'] }}"
grafana_db_port:        5432
grafana_db_name:        grafana
grafana_db_user:        grafana
grafana_db_password:    "{{ vault_grafana_db_password }}"
grafana_data_path:      "/data/grafana"
grafana_vm_datasource_url:   "http://{{ vip_address }}:{{ vmselect_port }}/select/0/prometheus"
grafana_loki_datasource_url: "http://{{ vip_address }}:{{ loki_port }}"

# =============================================================================
# POSTGRESQL
# =============================================================================
postgres_port:      5432
postgres_data_path: "/data/postgres"
postgres_password:  "{{ vault_postgres_password }}"

# =============================================================================
# VMAGENT
# =============================================================================
vmagent_scrape_interval: "15s"
vmagent_data_path:       "/data/vmagent"
vmagent_mem_limit:       "1g"
vmagent_cpu_limit:       "1.0"

# URL qua VIP — dùng cho single remote write (fallback)
vmagent_remote_write_url: "http://{{ vip_address }}:{{ vminsert_port }}/insert/0/prometheus"

# URL trực tiếp đến từng vminsert — tự generate từ inventory, KHÔNG hardcode IP
vmagent_remote_write_urls: >-
  {{ groups['monitoring_insert']
     | map('extract', hostvars, 'ansible_host')
     | map('regex_replace', '^', 'http://')
     | map('regex_replace', '$', ':' + vminsert_port | string + '/insert/0/prometheus')
     | list }}

vmagent_nodes: "{{ groups['monitoring_vmagent'] }}"

# =============================================================================
# NODE EXPORTER
# =============================================================================
node_exporter_port:      9100
node_exporter_data_path: "/var/lib/node_exporter/textfile_collector"

# =============================================================================
# LOKI
# =============================================================================
loki_port:            3100
loki_grpc_port:       9096
loki_memberlist_port: 7946
loki_data_path:       "/data/loki"
loki_retention_period: "30d"   # Local retention — S3 giữ 365d qua Loki compactor config
loki_replication_factor: 2
loki_mem_limit:       "2g"
loki_cpu_limit:       "1.5"
loki_chunk_cache_mb:  512      # Local filesystem cache cho chunks (MB)

# Promtail push qua VIP — Loki tự replication nội bộ
loki_push_urls:
  - "http://{{ vip_address }}:{{ loki_port }}/loki/api/v1/push"

promtail_port: 9080

# MinIO — S3-compatible backend cho Loki
minio_api_port:      9000
minio_console_port:  9001
minio_data_path:     "/data/minio"
minio_root_user:     "{{ vault_minio_root_user }}"
minio_root_password: "{{ vault_minio_root_password }}"
loki_minio_bucket:   "loki"
minio_mem_limit:     "2g"
minio_cpu_limit:     "1.0"

# =============================================================================
# GITEA + ANSIBLE RUNNER
# =============================================================================
gitea_admin_user:      "incosys"
gitea_admin_email:     "admin@monitoring.local"
gitea_admin_password:  "{{ vault_gitea_admin_password }}"
gitea_port:            3001
gitea_ssh_port:        2222
gitea_data_path:       "/data/gitea"
gitea_db_password:     "{{ vault_gitea_db_password }}"
gitea_secret_key:      "{{ vault_gitea_secret_key }}"
ansible_runner_port:   9091     # Khác 9000 để tránh conflict với minio_api_port
ansible_webhook_secret: "{{ vault_ansible_webhook_secret }}"

# =============================================================================
# PATHS
# =============================================================================
monitoring_base_dir: "/opt/monitoring"
data_base_dir:       "/data"

# =============================================================================
# RANDOM PING MONITORING
# =============================================================================
random_ping_pairs_per_round:  10    # Số cặp ping mỗi vòng
random_ping_rotate_interval:  120   # Rotate sau 120s (2 phút)
blackbox_exporter_port:       9115

# =============================================================================
# S3 SmartCloud — External S3-compatible storage (backup + long-term)
# =============================================================================
s3_enabled: true
s3_endpoint:        "{{ vault_s3_endpoint }}"
s3_access_key:      "{{ vault_s3_access_key }}"
s3_secret_key:      "{{ vault_s3_secret_key }}"
s3_region:          "us-east-1"
s3_bucket_metrics:  "{{ vault_s3_bucket_metrics }}"
s3_bucket_logs:     "{{ vault_s3_bucket_logs }}"
s3_loki_bucket:     "{{ vault_s3_bucket_logs }}"
vmbackup_bucket:    "{{ vault_s3_bucket_metrics }}"
vmbackup_local_path: "/backup/vmstorage"

# =============================================================================
# VMSINGLE — Cold tier, restore historical data từ S3
# =============================================================================
vmsingle_port:      8428
vmsingle_data_path: "/data/vmsingle"

# =============================================================================
# THANOS — Long-term storage on S3 (chỉ active khi s3_enabled: true)
# =============================================================================
s3_bucket_thanos: "{{ vault_s3_bucket_thanos }}"

thanos_receive_http_port:          19290
thanos_receive_grpc_port:          10907
thanos_receive_remote_write_port:     19291
thanos_receive_replication_factor: 2
thanos_store_http_port:            10906
thanos_store_grpc_port:            10905
thanos_query_http_port:            10902
thanos_query_grpc_port:            10901

thanos_data_path:         "/data/thanos"
thanos_receive_data_path: "/data/thanos/receive"
thanos_store_data_path:   "/data/thanos/store"
