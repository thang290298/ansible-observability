---
# inventory/hosts.yml
# =============================================================================
# QUY HOẠCH GROUP THEO SERVICE — scale từng service độc lập
#
# Khi nào scale service nào:
#   vmstorage quá tải I/O    → thêm node vào monitoring_storage
#   vminsert/select chậm     → thêm node vào monitoring_query
#   Grafana chậm             → thêm node vào monitoring_grafana
#   vmagent quá tải scrape   → thêm node vào monitoring_vmagent
#   Alertmanager cần thêm    → thêm node vào monitoring_alertmanager
#   PostgreSQL cần replica   → thêm node vào monitoring_db
#
# Ansible tự tính lại:
#   Keepalived priority (MASTER/BACKUP)
#   HAProxy backends cho từng service
#   vmstorage storageNodes
#   Alertmanager peers
#   vmagent remote write URLs
# =============================================================================

all:
  vars:
    ansible_user: ansible          # dedicated deployment user (non-root) — thay đổi nếu cần
    ansible_become: true           # leo quyền root bằng sudo
    ansible_become_method: sudo
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o ConnectTimeout=10'
    ansible_python_interpreter: /usr/bin/python3

  children:

    # ==========================================================================
    # KEEPALIVED + HAPROXY
    # Cài trên TẤT CẢ monitoring nodes để đảm bảo VIP không có SPOF
    # Node nào cũng có thể trở thành MASTER giữ VIP
    # --------------------------------------------------------------------------
    # Thêm node: Ansible tự tính lại priority
    #   node01 = MASTER (110), node02 = BACKUP (100), node03 = BACKUP (90)...
    # ==========================================================================
    monitoring_lb:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        node03: { ansible_host: 10.x.x.3 }
        # node04: { ansible_host: 10.x.x.4 }  ← thêm LB node

    # ==========================================================================
    # VMSTORAGE — Lưu trữ metrics
    # Scale khi: disk I/O cao, storage capacity gần đầy, ingestion rate tăng
    # Tối thiểu 3 nodes (replicationFactor=2 cần ít nhất 3 để an toàn)
    # --------------------------------------------------------------------------
    # Thêm node: vminsert tự phân phối data, không cần migration
    # ==========================================================================
    monitoring_storage:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        node03: { ansible_host: 10.x.x.3 }
        # node04: { ansible_host: 10.x.x.4 }  ← scale khi storage đầy

    # ==========================================================================
    # VMINSERT + VMSELECT — Ghi và đọc metrics
    # Scale khi: ingestion rate cao (insert), query chậm (select)
    # Có thể tách insert và select ra node riêng nếu cần
    # --------------------------------------------------------------------------
    # Thêm node: HAProxy tự thêm backend, load balance ngay
    # ==========================================================================
    monitoring_query:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        node03: { ansible_host: 10.x.x.3 }
        # node04: { ansible_host: 10.x.x.4 }  ← scale khi query chậm

    # ==========================================================================
    # GRAFANA — Dashboard & visualization
    # Scale khi: nhiều user đồng thời, dashboard nặng
    # Tất cả instances dùng chung PostgreSQL → session persist
    # --------------------------------------------------------------------------
    # Thêm node: HAProxy tự thêm backend (cookie-based session)
    # ==========================================================================
    monitoring_grafana:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        node03: { ansible_host: 10.x.x.3 }
        # node04: { ansible_host: 10.x.x.4 }  ← scale khi Grafana chậm

    # ==========================================================================
    # VMAGENT — Scrape agent
    # Scale khi: scrape interval bị miss, nhiều target (>500), CPU vmagent cao
    # Active-active: mỗi vmagent scrape TẤT CẢ targets
    # vmselect dedup dữ liệu trùng → không lo duplicate metrics
    # --------------------------------------------------------------------------
    # Thêm node: vmagent mới tự scrape toàn bộ targets, không cần chia sẻ
    # ==========================================================================
    monitoring_vmagent:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        # node03: { ansible_host: 10.x.x.3 }  ← scale khi vmagent quá tải

    # ==========================================================================
    # ALERTMANAGER — Cảnh báo
    # Scale khi: số lượng alert rules nhiều, cần thêm redundancy
    # Gossip cluster: tự đồng bộ silences, inhibitions
    # 2 nodes là đủ HA, tối đa 3 nodes (thêm không có lợi nhiều)
    # ==========================================================================
    monitoring_alertmanager:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        # node03: { ansible_host: 10.x.x.3 }  ← chỉ thêm nếu thực sự cần

    # ==========================================================================
    # POSTGRESQL — Database backend cho Grafana
    # Scale khi: nhiều Grafana instances, query DB chậm
    # Primary chỉ 1, replica thêm bao nhiêu cũng được
    # ==========================================================================
    monitoring_db:
      hosts:
        node01:
          ansible_host: 10.x.x.1
          pg_role: primary
        node02:
          ansible_host: 10.x.x.2
          pg_role: replica
        # node03:                          ← thêm replica nếu cần
        #   ansible_host: 10.x.x.3
        #   pg_role: replica

    # ==========================================================================
    # LOKI — Log aggregation cluster
    # Scale khi: log volume lớn, ingestion rate cao, disk đầy
    # 2 nodes là đủ HA (replication_factor=2)
    # Memberlist tự discover nhau qua IP — không cần cấu hình thêm
    # --------------------------------------------------------------------------
    # Thêm node: Loki memberlist tự join, HAProxy tự thêm backend
    # ==========================================================================
    monitoring_loki:
      hosts:
        node01: { ansible_host: 10.x.x.1 }
        node02: { ansible_host: 10.x.x.2 }
        # node03: { ansible_host: 10.x.x.3 }  ← scale khi log volume tăng

    # ==========================================================================
    # GITEA + ANSIBLE RUNNER
    # Không cần scale — 1 node là đủ
    # Backup định kỳ là đủ bảo vệ
    # ==========================================================================
    monitoring_gitea:
      hosts:
        node01: { ansible_host: 10.x.x.1 }

    # ==========================================================================
    # NHÓM TỔNG HỢP — dùng để query, không deploy trực tiếp
    # ==========================================================================
    monitoring:
      children:
        monitoring_lb:
        monitoring_storage:
        monitoring_query:
        monitoring_grafana:
        monitoring_vmagent:
        monitoring_alertmanager:
        monitoring_db:
        monitoring_loki:
        monitoring_gitea:

    # ==========================================================================
    # EXPORTERS — Chỉ cài node_exporter (+ exporter riêng của từng loại)
    # ==========================================================================
    ceph_dbp3:
      vars:
        ceph_exporter_port: 9283
        site: DBP
        cluster: ceph-dbp3
        role: ceph
      hosts:
        ceph-dbp3-01: { ansible_host: 10.x.x.10 }
        ceph-dbp3-02: { ansible_host: 10.x.x.11 }
        ceph-dbp3-03: { ansible_host: 10.x.x.12 }

    compute_hn4:
      vars:
        site: HN4
        cluster: smartcloud2022
        role: compute
      hosts:
        compute01-hn4: { ansible_host: 10.x.x.20 }
        compute02-hn4: { ansible_host: 10.x.x.21 }

    controller_hn4:
      vars:
        site: HN4
        cluster: smartcloud2022
        role: controller
        openstack_exporter_port: 9180
      hosts:
        controller01-hn4: { ansible_host: 10.x.x.30 }
        controller02-hn4: { ansible_host: 10.x.x.31 }
        controller03-hn4: { ansible_host: 10.x.x.32 }

    exporters:
      children:
        monitoring_lb:
        ceph_dbp3:
        compute_hn4:
        controller_hn4:

    # Promtail cài trên TẤT CẢ servers (log collector)
    promtail_nodes:
      children:
        monitoring:
        ceph_dbp3:
        compute_hn4:
        controller_hn4:
