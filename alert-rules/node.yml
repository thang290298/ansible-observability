groups:
  - name: node.rules
    rules:
      - alert: NodeDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Server {{ $labels.instance }} DOWN"
          description: "Node {{ $labels.instance }} ({{ $labels.site }}/{{ $labels.cluster }}) không còn phản hồi trong 2 phút."

      - alert: NodeHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU cao trên {{ $labels.instance }}"
          description: "CPU usage {{ $value | humanize }}% > 90% trong 5 phút."

      - alert: NodeCriticalCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 98
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CPU cực cao trên {{ $labels.instance }}"
          description: "CPU usage {{ $value | humanize }}% > 98% trong 2 phút."

      - alert: NodeHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM cao trên {{ $labels.instance }}"
          description: "RAM usage {{ $value | humanize }}% > 90%."

      - alert: NodeDiskWarning
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"} / node_filesystem_size_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk {{ $labels.mountpoint }} sắp đầy trên {{ $labels.instance }}"
          description: "Disk usage {{ $value | humanize }}% > 80% tại {{ $labels.mountpoint }}."

      - alert: NodeDiskCritical
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"} / node_filesystem_size_bytes)) * 100 > 92
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk {{ $labels.mountpoint }} gần đầy trên {{ $labels.instance }}"
          description: "Disk usage {{ $value | humanize }}% > 92%. Cần xử lý ngay!"

      - alert: NodeDiskWillFillIn24h
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"}[24h], 24*3600) < 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Disk {{ $labels.mountpoint }} sẽ đầy trong 24h — {{ $labels.instance }}"
          description: "Dự đoán disk sẽ đầy trong 24h dựa trên trend 24h gần đây."

      - alert: NodeHighLoad
        expr: node_load15 / on(instance) count by(instance) (node_cpu_seconds_total{mode="idle"}) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Load average cao trên {{ $labels.instance }}"
          description: "Load15 per CPU = {{ $value | humanize }} > 2."

      - alert: NodeOOMKiller
        expr: increase(node_vmstat_oom_kill[1h]) > 0
        labels:
          severity: critical
        annotations:
          summary: "OOM Kill trên {{ $labels.instance }}"
          description: "Có {{ $value }} OOM kill event trong 1 giờ qua."

      - alert: NodeNetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) + rate(node_network_transmit_errs_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Network errors trên {{ $labels.instance }}"
          description: "{{ $value | humanize }} network errors/s trên interface {{ $labels.device }}."

      - alert: NodeClockSkew
        expr: abs(node_timex_offset_seconds) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "NTP clock skew trên {{ $labels.instance }}"
          description: "Clock skew {{ $value | humanize }}s > 50ms. Kiểm tra NTP."
