---
# playbooks/reconfig-alerts.yml
# Cập nhật alert rules trên vmalert
- name: "🔔 [RECONFIG] Cập nhật Alert Rules"
  hosts: monitoring_vmagent
  become: true
  gather_facts: false
  tags: [reconfig, alerts]

  tasks:
    - name: "[alerts] Tạo thư mục rules"
      file:
        path: "{{ monitoring_base_dir }}/vmalert/rules"
        state: directory
        mode: '0755'

    - name: "[alerts] Copy alert rules"
      copy:
        src: "{{ playbook_dir }}/../files/alert-rules/"
        dest: "{{ monitoring_base_dir }}/vmalert/rules/"
        backup: true
      notify: Reload vmalert

    - name: "[alerts] Hiển thị rules đã cập nhật"
      find:
        paths: "{{ monitoring_base_dir }}/vmalert/rules"
        patterns: "*.yml"
      register: rule_files

    - debug:
        msg: "{{ rule_files.matched }} alert rule files đã được cập nhật"

  handlers:
    - name: Reload vmalert
      shell: docker kill --signal=SIGHUP vmalert
      ignore_errors: true
