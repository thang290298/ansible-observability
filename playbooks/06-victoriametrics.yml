---
# playbooks/06-victoriametrics.yml
- name: "📈 [06/12] Triển khai VictoriaMetrics Cluster"
  hosts: monitoring
  become: true
  serial: 1                    # Rolling deploy từng node một
  tags: [victoriametrics, vm, metrics]

  pre_tasks:
    - name: "[vm] Tạo thư mục data"
      file:
        path: "{{ vm_storage_data_path }}"
        state: directory
        mode: '0755'

    - name: "[vm] Hiển thị cấu hình cluster"
      debug:
        msg: |
          VictoriaMetrics Cluster Config:
          ─────────────────────────────────
          Version        : {{ victoriametrics_version }}
          Retention      : {{ vm_retention_period }} months
          Replication    : {{ vm_replication_factor }}x
          Storage nodes  : {{ vmstorage_nodes | join(', ') }}
          vminsert port  : {{ vminsert_port }}
          vmselect port  : {{ vmselect_port }}
          vmstorage port : {{ vmstorage_port }}

  roles:
    - role: victoriametrics
      tags: victoriametrics

  post_tasks:
    - name: "[vm] Verify vmstorage health"
      uri:
        url: "http://{{ ansible_host }}:{{ vmstorage_port }}/metrics"
        method: GET
        status_code: 200
      retries: 5
      delay: 5
      register: vm_health

    - name: "[vm] ✅ vmstorage OK trên {{ inventory_hostname }}"
      debug:
        msg: "vmstorage healthy on {{ inventory_hostname }}:{{ vmstorage_port }}"
      when: vm_health.status == 200
