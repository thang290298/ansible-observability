---
# playbooks/01-common.yml
# Cấu hình OS cơ bản cho tất cả node

- name: "📦 [01/12] Cấu hình OS cơ bản"
  hosts: all
  gather_facts: true
  become: true
  tags: [common, base]

  pre_tasks:
    - name: "[common] Hiển thị thông tin node"
      debug:
        msg: |
          ══════════════════════════════════════
          Node     : {{ inventory_hostname }}
          IP       : {{ ansible_host }}
          OS       : {{ ansible_distribution }} {{ ansible_distribution_version }}
          ══════════════════════════════════════

  roles:
    - role: common
      tags: common
