---
# playbooks/ops/alert-rules-deploy.yml
# Deploy alert rules to Prometheus + Vmalert + AlertManager
# Automatically manages alert rules from alert-rules/ directory

- name: "[Alert Rules] Auto-Deploy alert rules to monitoring stack"
  hosts: "{{ alert_rules_target_group | default('monitoring_metrics') }}"
  serial: 1
  gather_facts: false
  tags: [alert-rules, deployment]

  vars:
    alert_rules_dir: "{{ playbook_dir }}/../../alert-rules"
    alert_rules_local_dir: "{{ monitoring_base_dir }}/prometheus/alert-rules"

  tasks:
    # ── PREFLIGHT: VALIDATE RULES ────────────────────────────────────────────
    - name: "[alert-rules] Display deployment info"
      ansible.builtin.debug:
        msg:
          - "Alert Rules Deployment"
          - "Target: {{ inventory_hostname }}"
          - "Source: {{ alert_rules_dir }}"
          - "Destination: {{ alert_rules_local_dir }}"
      run_once: true
      tags: [alert-rules]

    - name: "[alert-rules] Validate alert rules syntax (promtool)"
      ansible.builtin.command:
        cmd: "docker run --rm -v {{ alert_rules_dir }}:/rules:ro prom/prometheus:latest promtool check rules /rules/*.yml"
      register: alert_rules_validation
      changed_when: false
      failed_when: alert_rules_validation.rc != 0
      run_once: true
      tags: [alert-rules, validation]

    - name: "[alert-rules] Display validation result"
      ansible.builtin.debug:
        msg: "{{ alert_rules_validation.stdout_lines }}"
      run_once: true
      tags: [alert-rules, validation]

    # ── PREPARE: CREATE LOCAL DIRECTORIES ────────────────────────────────────
    - name: "[alert-rules] Create alert-rules directory locally"
      ansible.builtin.file:
        path: "{{ alert_rules_local_dir }}"
        state: directory
        mode: '0755'
      tags: [alert-rules]

    # ── DEPLOY: COPY RULES FILES ─────────────────────────────────────────────
    - name: "[alert-rules] Copy alert rules to local prometheus directory"
      ansible.builtin.copy:
        src: "{{ alert_rules_dir }}/"
        dest: "{{ alert_rules_local_dir }}/"
        mode: '0644'
        backup: true
      tags: [alert-rules]

    # ── DEPLOY: VMALERT INTEGRATION ──────────────────────────────────────────
    - name: "[alert-rules] Update vmalert rules directory"
      ansible.builtin.file:
        path: "{{ monitoring_base_dir }}/vmalert/alert-rules"
        state: directory
        mode: '0755'
      tags: [alert-rules, vmalert]

    - name: "[alert-rules] Copy alert rules to vmalert"
      ansible.builtin.copy:
        src: "{{ alert_rules_dir }}/"
        dest: "{{ monitoring_base_dir }}/vmalert/alert-rules/"
        mode: '0644'
        backup: true
      tags: [alert-rules, vmalert]

    # ── RELOAD: SIGNAL COMPONENTS ────────────────────────────────────────────
    - name: "[alert-rules] Reload Prometheus rules"
      ansible.builtin.uri:
        url: "http://localhost:{{ prometheus_port }}/-/reload"
        method: POST
        status_code: [200, 204]
      ignore_errors: true
      tags: [alert-rules, reload]

    - name: "[alert-rules] Restart vmalert container (if exists)"
      community.docker.docker_container:
        name: vmalert
        state: restarted
      ignore_errors: true
      tags: [alert-rules, vmalert, reload]

    - name: "[alert-rules] Verify Prometheus loaded rules"
      ansible.builtin.uri:
        url: "http://localhost:{{ prometheus_port }}/api/v1/rules"
        method: GET
        return_content: true
        status_code: 200
      register: prometheus_rules_status
      retries: 3
      delay: 5
      tags: [alert-rules, verification]

    - name: "[alert-rules] Display loaded rules count"
      ansible.builtin.debug:
        msg:
          - "✓ Alert rules deployed successfully"
          - "Prometheus rules endpoint: http://{{ inventory_hostname }}:{{ prometheus_port }}/api/v1/rules"
          - "Total rule groups: {{ prometheus_rules_status.json.data.groups | length }}"
      tags: [alert-rules, verification]

    # ── VERSION CONTROL: COMMIT ──────────────────────────────────────────────
    - name: "[alert-rules] Document deployment in local git (if available)"
      block:
        - name: "[alert-rules] Get alert-rules git commit hash"
          ansible.builtin.command:
            cmd: "git -C {{ alert_rules_dir }}/../ log -1 --format=%H alert-rules/"
          register: alert_rules_git_hash
          changed_when: false
          ignore_errors: true

        - name: "[alert-rules] Create deployment marker"
          ansible.builtin.copy:
            content: |
              # Alert Rules Deployment Record
              Date: {{ ansible_date_time.iso8601 }}
              Host: {{ inventory_hostname }}
              Git commit: {{ alert_rules_git_hash.stdout | default('N/A') }}
              Deployed by: Ansible playbook
            dest: "{{ alert_rules_local_dir }}/DEPLOYMENT.txt"
            mode: '0644'
      tags: [alert-rules, version-control]
