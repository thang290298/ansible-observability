---
# playbooks/add-node.yml
# Thêm server mới vào hệ thống monitoring (cài node_exporter + update targets)

- name: "➕ [ADD-NODE] Thêm server mới vào monitoring"
  hosts: "{{ new_node | default('ungrouped') }}"
  become: true
  gather_facts: true
  tags: [add-node]

  pre_tasks:
    - name: "[add-node] Thông tin node mới"
      debug:
        msg: |
          ══════════════════════════════════════════════
          THÊM NODE MỚI VÀO MONITORING:
          ══════════════════════════════════════════════
          Hostname  : {{ inventory_hostname }}
          IP        : {{ ansible_host }}
          OS        : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Group     : {{ group_names | join(', ') }}
          ══════════════════════════════════════════════

  tasks:
    - name: "[add-node] Cấu hình OS cơ bản"
      include_role:
        name: common

    - name: "[add-node] Cài node_exporter"
      include_role:
        name: node_exporter

    - name: "[add-node] Verify node_exporter"
      uri:
        url: "http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
        method: GET
        status_code: 200
      retries: 5
      delay: 3

    - name: "[add-node] ✅ node_exporter OK trên {{ inventory_hostname }}"
      debug:
        msg: "node_exporter running at {{ ansible_host }}:{{ node_exporter_port }}"

# Sau đó update targets trên monitoring nodes
- name: "🎯 [ADD-NODE] Cập nhật scrape targets trên monitoring nodes"
  hosts: monitoring
  become: true
  gather_facts: false

  tasks:
    - name: "[add-node] Generate lại scrape config với node mới"
      template:
        src: "{{ playbook_dir }}/../templates/vmagent-scrape.yml.j2"
        dest: "{{ monitoring_base_dir }}/vmagent/scrape.yml"
        backup: true
      notify: Reload vmagent

    - name: "[add-node] ✅ Targets đã được cập nhật — vmagent sẽ scrape ngay"
      debug:
        msg: "{{ new_node }} đã được thêm vào scrape config"

  handlers:
    - name: Reload vmagent
      shell: docker kill --signal=SIGHUP vmagent
      ignore_errors: true
