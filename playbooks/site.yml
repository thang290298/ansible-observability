---
# playbooks/site.yml
# Full deployment — deploy toàn bộ hệ thống từ đầu
# Thứ tự: common → docker → lb → vm_cluster → db → grafana → alertmanager → vmagent → gitea → loki → promtail

- name: "[01] OS cơ bản — tất cả nodes"
  hosts: all
  become: true
  gather_facts: true
  tags: [common]
  roles: [common]

- name: "[02] node_exporter — tất cả exporters"
  hosts: exporters
  become: true
  gather_facts: false
  tags: [node_exporter]
  roles: [node_exporter]

- name: "[03] Docker — tất cả monitoring nodes"
  hosts: monitoring
  become: true
  gather_facts: true
  tags: [docker]
  roles: [docker]

- name: "[04] Keepalived + HAProxy — monitoring_lb"
  hosts: monitoring_lb
  become: true
  gather_facts: false
  tags: [keepalived, haproxy, lb]
  roles: [keepalived, haproxy]

- name: "[05] vmstorage — monitoring_storage"
  hosts: monitoring_storage
  become: true
  gather_facts: false
  serial: 1
  tags: [vmstorage, vm]
  pre_tasks:
    - name: "[vmstorage] Verify cluster healthy trước khi proceed"
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:{{ vmstorage_port }}/health"
        status_code: 200
      retries: 3
      delay: 5
      ignore_errors: true   # First deploy: container chưa tồn tại — warn nhưng không block
  roles: [vmstorage]

- name: "[06] vminsert + vmselect — monitoring_query"
  hosts: monitoring_query
  become: true
  gather_facts: false
  serial: 1
  tags: [vmquery, vm]
  pre_tasks:
    - name: "[vmquery] Chờ vmstorage cluster ổn định"
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ vmstorage_port }}/health"
        status_code: 200
      loop: "{{ groups['monitoring_storage'] }}"
      retries: 12
      delay: 5
      run_once: true
  roles: [vminsert, vmselect]

- name: "[07] PostgreSQL — monitoring_db"
  hosts: monitoring_db
  become: true
  gather_facts: false
  tags: [postgresql, db]
  roles: [postgresql]

- name: "[08] Grafana — monitoring_grafana"
  hosts: monitoring_grafana
  become: true
  gather_facts: false
  serial: 1
  tags: [grafana]
  roles: [grafana]

- name: "[09] Alertmanager — monitoring_alertmanager"
  hosts: monitoring_alertmanager
  become: true
  gather_facts: false
  serial: 1
  tags: [alertmanager]
  roles: [alertmanager]

- name: "[09.5] vmalert — monitoring_vmalert"
  hosts: monitoring_vmalert
  become: true
  gather_facts: false
  serial: 1
  tags: [vmalert]
  pre_tasks:
    - name: "[vmalert] Chờ Alertmanager healthy"
      ansible.builtin.uri:
        url: "http://{{ hostvars[item]['ansible_host'] }}:{{ alertmanager_internal_port | default(alertmanager_port) }}/-/healthy"
        status_code: 200
      loop: "{{ groups['monitoring_alertmanager'] }}"
      retries: 10
      delay: 5
      run_once: true
      ignore_errors: true
  roles: [vmalert]

- name: "[10] vmagent — monitoring_vmagent"
  hosts: monitoring_vmagent
  become: true
  gather_facts: false
  tags: [vmagent]
  roles: [vmagent]

- name: "[11] Gitea + Ansible Runner — monitoring_gitea"
  hosts: monitoring_gitea
  become: true
  gather_facts: false
  tags: [gitea]
  roles: [gitea]

- name: "[12] Loki Log Cluster — monitoring_loki"
  hosts: monitoring_loki
  become: true
  gather_facts: false
  serial: 1
  tags: [loki, logs]
  roles: [loki]

- name: "[13] Promtail — tất cả servers"
  hosts: promtail_nodes
  become: true
  gather_facts: false
  tags: [promtail, logs]
  roles: [promtail]

- name: "[14] Random Ping Monitoring — monitoring_lb"
  hosts: monitoring_lb
  become: true
  gather_facts: false
  tags: [random-ping]
  roles: [random_ping]

- name: "[15] Thanos Receive — monitoring_thanos_receive"
  hosts: monitoring_thanos_receive
  become: true
  gather_facts: false
  tags: [thanos, thanos-receive]
  roles: [thanos]

- name: "[16] Thanos Store + Query — monitoring_thanos_query"
  hosts: monitoring_thanos_query
  become: true
  gather_facts: false
  tags: [thanos, thanos-query]
  roles: [thanos]

# Verify sau cùng — bao gồm cả Thanos và Random Ping
- name: "[17] Verify toàn bộ hệ thống"
  import_playbook: ops/verify.yml
  tags: [verify]
