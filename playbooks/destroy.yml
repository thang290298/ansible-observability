---
# playbooks/destroy.yml
# Gỡ bỏ toàn bộ hệ thống monitoring

- name: "💥 [DESTROY] Gỡ bỏ toàn bộ hệ thống monitoring"
  hosts: monitoring
  become: true
  tags: [destroy]

  pre_tasks:
    - name: "[destroy] ⚠️  CẢNH BÁO CUỐI CÙNG"
      pause:
        seconds: 10
        prompt: |
          ╔══════════════════════════════════════════════════════╗
          ║  ⚠️  CẢNH BÁO: SẮP XÓA TOÀN BỘ HỆ THỐNG!          ║
          ║  Tất cả containers, volumes, config sẽ bị xóa!      ║
          ║  Đợi 10 giây... Ctrl+C để hủy                       ║
          ╚══════════════════════════════════════════════════════╝
      when: confirm_destroy is defined and confirm_destroy | bool

  tasks:
    - name: "[destroy] Dừng tất cả containers monitoring"
      shell: |
        cd {{ monitoring_base_dir }} && \
        for f in */docker-compose.yml; do
          echo "Stopping: $f"
          docker-compose -f "$f" down --remove-orphans 2>/dev/null || true
        done
      ignore_errors: true

    - name: "[destroy] Xóa containers còn lại"
      shell: |
        docker ps -a --filter "label=monitoring" -q | xargs docker rm -f 2>/dev/null || true
      ignore_errors: true

    - name: "[destroy] Xóa data volumes"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ vm_storage_data_path }}"
        - "{{ grafana_data_path }}"
        - "{{ alertmanager_data_path }}"
        - "{{ vmagent_data_path }}"
      when: confirm_destroy is defined and confirm_destroy | bool

    - name: "[destroy] Xóa config directory"
      file:
        path: "{{ monitoring_base_dir }}"
        state: absent
      when: confirm_destroy is defined and confirm_destroy | bool

    - name: "[destroy] Dừng và disable HAProxy"
      service:
        name: haproxy
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[destroy] Dừng và disable Keepalived"
      service:
        name: keepalived
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[destroy] ✅ Destroy hoàn thành trên {{ inventory_hostname }}"
      debug:
        msg: "Tất cả monitoring components đã được gỡ bỏ trên {{ inventory_hostname }}"

- name: "📊 [DESTROY] Gỡ node_exporter trên tất cả servers"
  hosts: exporters
  become: true
  ignore_errors: true

  tasks:
    - name: "[destroy] Dừng node_exporter"
      service:
        name: node_exporter
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[destroy] Xóa binary và service"
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/node_exporter
        - /etc/systemd/system/node_exporter.service
      ignore_errors: true
