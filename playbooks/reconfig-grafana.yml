---
# playbooks/reconfig-grafana.yml
# Cập nhật Grafana datasource và provisioning config
- name: "📊 [RECONFIG] Cập nhật Grafana config"
  hosts: monitoring_grafana
  become: true
  gather_facts: false
  serial: 1
  tags: [reconfig, grafana]

  tasks:
    - name: "[grafana] Generate datasources config"
      template:
        src: "{{ playbook_dir }}/../roles/grafana/templates/datasources.yml.j2"
        dest: "/data/grafana/provisioning/datasources/datasources.yml"
        backup: true
      notify: Reload grafana

    - name: "[grafana] Reload Grafana"
      uri:
        url: "http://localhost:{{ grafana_port }}/api/admin/provisioning/datasources/reload"
        method: POST
        user: "{{ grafana_admin_user }}"
        password: "{{ grafana_admin_password }}"
        force_basic_auth: true
        status_code: [200, 204]
      ignore_errors: true

  handlers:
    - name: Reload grafana
      shell: docker kill --signal=SIGHUP grafana
      ignore_errors: true
