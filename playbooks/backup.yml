---
# playbooks/backup.yml
# Backup toàn bộ dữ liệu monitoring stack

- name: "💾 [BACKUP] VictoriaMetrics data"
  hosts: monitoring_storage
  become: true
  gather_facts: false
  tags: [backup-vm]

  tasks:
    - name: "[backup] Tạo thư mục backup"
      file:
        path: "/backup/{{ ansible_date_time.date }}"
        state: directory
        mode: '0755'

    - name: "[backup] Snapshot vmstorage data"
      uri:
        url: "http://localhost:{{ vmstorage_port }}/snapshot/create"
        method: GET
      register: snapshot

    - name: "[backup] Archive snapshot"
      archive:
        path: "{{ vm_storage_data_path }}/snapshots/{{ snapshot.json.snapshotName }}"
        dest: "/backup/{{ ansible_date_time.date }}/vmstorage-{{ inventory_hostname }}-{{ ansible_date_time.epoch }}.tar.gz"
        format: gz

    - name: "[backup] ✅ vmstorage backup xong"
      debug:
        msg: "Backup: /backup/{{ ansible_date_time.date }}/vmstorage-{{ inventory_hostname }}-{{ ansible_date_time.epoch }}.tar.gz"

- name: "💾 [BACKUP] PostgreSQL (Grafana DB)"
  hosts: monitoring_db
  become: true
  gather_facts: false
  tags: [backup-pg]

  tasks:
    - name: "[backup] Tạo thư mục backup"
      file:
        path: "/backup/{{ ansible_date_time.date }}"
        state: directory
        mode: '0755'

    - name: "[backup] pg_dump"
      command: >
        docker exec postgresql pg_dump -U postgres grafana
      register: pg_dump_output

    - name: "[backup] Lưu dump"
      copy:
        content: "{{ pg_dump_output.stdout }}"
        dest: "/backup/{{ ansible_date_time.date }}/grafana-db-{{ inventory_hostname }}-{{ ansible_date_time.epoch }}.sql"
        mode: '0640'

    - name: "[backup] ✅ PostgreSQL backup xong"
      debug:
        msg: "Backup: /backup/{{ ansible_date_time.date }}/grafana-db-{{ inventory_hostname }}-{{ ansible_date_time.epoch }}.sql"

- name: "💾 [BACKUP] Grafana dashboards"
  hosts: monitoring_grafana[0]
  become: true
  gather_facts: false
  tags: [backup-grafana]

  tasks:
    - name: "[backup] Export tất cả dashboards qua API"
      uri:
        url: "http://localhost:{{ grafana_port }}/api/search?type=dash-db&limit=500"
        headers:
          Authorization: "Basic {{ (grafana_admin_user + ':' + grafana_admin_password) | b64encode }}"
      register: dashboards

    - name: "[backup] Tạo thư mục dashboards"
      file:
        path: "/backup/{{ ansible_date_time.date }}/dashboards"
        state: directory

    - name: "[backup] Export từng dashboard"
      uri:
        url: "http://localhost:{{ grafana_port }}/api/dashboards/uid/{{ item.uid }}"
        headers:
          Authorization: "Basic {{ (grafana_admin_user + ':' + grafana_admin_password) | b64encode }}"
      register: dash_export
      loop: "{{ dashboards.json }}"
      loop_control:
        label: "{{ item.title }}"

    - name: "[backup] Lưu dashboard JSON"
      copy:
        content: "{{ item.json | to_nice_json }}"
        dest: "/backup/{{ ansible_date_time.date }}/dashboards/{{ item.item.uid }}.json"
      loop: "{{ dash_export.results }}"
      loop_control:
        label: "{{ item.item.title }}"

    - name: "[backup] ✅ Grafana dashboards backup xong"
      debug:
        msg: "{{ dashboards.json | length }} dashboards saved to /backup/{{ ansible_date_time.date }}/dashboards/"
